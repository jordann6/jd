<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .label { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .row { display: grid; grid-template-columns: 200px 1fr; gap: 16px; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e1e1e; }
  .row:last-child { border: 0; }
  .lbl { font-family: 'IBM Plex Mono'; font-size: 9.5px; color: #555; letter-spacing: 0.06em; text-transform: uppercase; }
  .wm { font-family: 'Barlow Condensed'; font-weight: 700; letter-spacing: 0.02em; }
  .wm-lg { font-size: 32px; color: #f0f0f0; }
  .wm-md { font-size: 22px; color: #f0f0f0; }
  .wm-sm { font-size: 16px; color: #f0f0f0; }
  .wm .dot { color: #555; }
</style></head>
<body>
  <div class="head"><span class="label">// JN. wordmark</span><span class="meta">3 sizes</span></div>
  <div class="row"><span class="lbl">Hero (32px)</span><span class="wm wm-lg">JN<span class="dot">.</span></span></div>
  <div class="row"><span class="lbl">Nav (22px)</span><span class="wm wm-md">JN<span class="dot">.</span></span></div>
  <div class="row"><span class="lbl">Footer (16px)</span><span class="wm wm-sm">JN<span class="dot">.</span></span></div>
</body></html>
