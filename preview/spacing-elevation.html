<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .demo {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .cell {
    background: var(--bg);
    padding: 14px;
    transition: background 0.4s cubic-bezier(0.16,1,0.3,1);
    cursor: pointer;
  }
  .cell:hover { background: var(--surface); }
  .cell .num { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .cell .ttl { font-family: 'Barlow Condensed'; font-weight: 600; font-size: 14px; color: var(--white); letter-spacing: 0.02em; }
  .row-meta { display: flex; gap: 22px; padding-top: 14px; border-top: 1px solid var(--border); }
  .pair { display: flex; flex-direction: column; gap: 2px; }
  .k { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .v { font-family: 'IBM Plex Mono'; font-size: 9.5px; color: var(--text-secondary); }
</style></head>
<body>
  <div class="head"><span class="label">// elevation · zero shadow system</span><span class="meta">bg shift only</span></div>
  <div class="demo">
    <div class="cell"><div class="num">Project 01</div><div class="ttl">Default</div></div>
    <div class="cell" style="background:#111111"><div class="num">Project 02</div><div class="ttl">Hover (#111)</div></div>
    <div class="cell"><div class="num">Project 03</div><div class="ttl">Default</div></div>
  </div>
  <div class="row-meta">
    <div class="pair"><span class="k">Method</span><span class="v">background shift</span></div>
    <div class="pair"><span class="k">From</span><span class="v">#050505</span></div>
    <div class="pair"><span class="k">To</span><span class="v">#111111</span></div>
    <div class="pair"><span class="k">Duration</span><span class="v">0.4s ease</span></div>
    <div class="pair"><span class="k">box-shadow</span><span class="v">never</span></div>
  </div>
</body></html>
