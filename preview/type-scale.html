<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;800&family=Barlow:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .scale { display: flex; flex-direction: column; }
  .row {
    display: grid;
    grid-template-columns: 1fr 130px;
    align-items: baseline;
    gap: 16px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border: 0; }
  .meta-r { font-family: "IBM Plex Mono"; font-size: 9.5px; color: var(--text-dim); letter-spacing: 0.04em; text-align: right; }
</style></head>
<body>
  <div class="head"><span class="label">// type scale</span><span class="meta">hero → mono-xs</span></div>
  <div class="scale">
    <div class="row"><span style="font-family:'Barlow Condensed';font-weight:800;font-size:42px;letter-spacing:-0.02em;color:#f0f0f0;line-height:1">Hero name</span><span class="meta-r">160 · display · 800</span></div>
    <div class="row"><span style="font-family:'Barlow Condensed';font-weight:800;font-size:28px;letter-spacing:-0.02em;color:#f0f0f0;text-transform:uppercase;line-height:1">Build it</span><span class="meta-r">72 · display · 800</span></div>
    <div class="row"><span style="font-family:'Barlow Condensed';font-weight:700;font-size:20px;letter-spacing:0.1em;text-transform:uppercase;color:#f0f0f0">Section title</span><span class="meta-r">28 · display · 700</span></div>
    <div class="row"><span style="font-family:'Barlow Condensed';font-weight:600;font-size:18px;color:#f0f0f0">Card title — h3</span><span class="meta-r">20 · display · 600</span></div>
    <div class="row"><span style="font-family:'Barlow';font-weight:300;font-size:14px;color:#888888">Body paragraph copy</span><span class="meta-r">14 · body · 300</span></div>
    <div class="row"><span style="font-family:'IBM Plex Mono';font-size:11px;color:#888;letter-spacing:0.06em;text-transform:uppercase">Mono metadata label</span><span class="meta-r">11 · mono · 400</span></div>
    <div class="row"><span style="font-family:'IBM Plex Mono';font-size:9px;color:#555;letter-spacing:0.04em;text-transform:uppercase">Project tag — xs</span><span class="meta-r">9 · mono · 400</span></div>
  </div>
</body></html>
