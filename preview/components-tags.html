<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .gname { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { font-family: 'IBM Plex Mono'; font-size: 10px; color: #555; letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 14px; border: 1px solid #1e1e1e; }
  .exp-tag { font-family: 'IBM Plex Mono'; font-size: 10px; color: #999; background: #141414; border: 1px solid #252525; padding: 4px 10px; letter-spacing: 0.04em; }
  .project-tag { font-family: 'IBM Plex Mono'; font-size: 9px; color: #999; background: #141414; border: 1px solid #252525; padding: 3px 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  .skill-tag { font-family: 'IBM Plex Mono'; font-size: 11px; color: #888; background: #141414; border: 1px solid #252525; padding: 5px 12px; letter-spacing: 0.02em; }
</style></head>
<body>
  <div class="head"><span class="label">// tags + badges</span><span class="meta">4 sizes</span></div>
  <div class="group">
    <span class="gname">.badge — hero</span>
    <div class="row"><span class="badge">AWS SAA-C03</span><span class="badge">AZ-104</span><span class="badge">Chicago, IL</span></div>
  </div>
  <div class="group">
    <span class="gname">.skill-tag</span>
    <div class="row"><span class="skill-tag">Python</span><span class="skill-tag">Terraform</span><span class="skill-tag">Kubernetes</span><span class="skill-tag">FastAPI</span></div>
  </div>
  <div class="group">
    <span class="gname">.exp-tag · .project-tag</span>
    <div class="row"><span class="exp-tag">AWS Lambda</span><span class="exp-tag">Boto3</span><span class="project-tag">DynamoDB</span><span class="project-tag">CloudWatch</span></div>
  </div>
</body></html>
