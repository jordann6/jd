<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .row { display: flex; gap: 18px; align-items: stretch; }
  .item { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .demo { height: 90px; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  .b1 { border: 1px solid #1e1e1e; }
  .b2 { border: 1px solid #333333; }
  .info { display: flex; justify-content: space-between; align-items: baseline; }
  .k { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .v { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-secondary); }
  .note { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-secondary); letter-spacing: 0.04em; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 14px; }
  .corner { position: absolute; width: 8px; height: 8px; border: 1px solid var(--white); }
  .demo { position: relative; }
</style></head>
<body>
  <div class="head"><span class="label">// corner radii · all zero</span><span class="meta">non-negotiable</span></div>
  <div class="row">
    <div class="item">
      <div class="demo b1">
        <span style="font-family:'IBM Plex Mono';font-size:18px;color:#888;letter-spacing:0.04em">radius: 0</span>
      </div>
      <div class="info"><span class="k">--radius</span><span class="v">0px</span></div>
    </div>
    <div class="item">
      <div class="demo b2">
        <span style="font-family:'IBM Plex Mono';font-size:18px;color:#888;letter-spacing:0.04em">hover: 0</span>
      </div>
      <div class="info"><span class="k">hover state</span><span class="v">0px</span></div>
    </div>
  </div>
  <div class="note">Buttons, cards, tags, badges, inputs — every surface is hard-edged. Don't add radii anywhere.</div>
</body></html>
