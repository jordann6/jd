<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .cell { background: var(--bg); padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 8px; }
  .swatch-row { display: flex; align-items: center; gap: 10px; }
  .bar { background: var(--white); height: 4px; }
  .key { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .val { font-family: "IBM Plex Mono"; font-size: 9.5px; color: var(--text-secondary); margin-left: auto; }
</style></head>
<body>
  <div class="head"><span class="label">// spacing scale</span><span class="meta">px tokens</span></div>
  <div class="grid">
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:6px"></div><span class="key">--gap-xs</span><span class="val">6px</span></div></div>
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:12px"></div><span class="key">--gap-sm</span><span class="val">12px</span></div></div>
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:20px"></div><span class="key">--gap-md</span><span class="val">20px</span></div></div>
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:36px"></div><span class="key">--gap-lg</span><span class="val">36px</span></div></div>
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:48px"></div><span class="key">--gap-xl</span><span class="val">48px</span></div></div>
    <div class="cell"><div class="swatch-row"><div class="bar" style="width:64px"></div><span class="key">--gap-2xl</span><span class="val">64px</span></div></div>
    <div class="cell" style="grid-column:1/-1"><div class="swatch-row"><div class="bar" style="width:140px"></div><span class="key">--section-gap</span><span class="val">140px vertical</span></div></div>
  </div>
</body></html>
