<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .label { font-size: 10px; }
  .meta { font-family: "IBM Plex Mono"; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn-primary { font-family: 'IBM Plex Mono'; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #000; background: #f0f0f0; padding: 14px 32px; border: 1px solid transparent; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
  .btn-primary:hover { background: transparent; color: #f0f0f0; border-color: #333; }
  .btn-secondary { font-family: 'IBM Plex Mono'; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #888; background: transparent; padding: 14px 32px; border: 1px solid #1e1e1e; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
  .btn-secondary:hover { color: #f0f0f0; border-color: #333; }
  .nav-cta { font-family: 'IBM Plex Mono'; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #000; background: #f0f0f0; padding: 8px 20px; }
  .specs { display: flex; gap: 22px; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 16px; }
  .pair { display: flex; flex-direction: column; gap: 2px; }
  .k { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .v { font-family: 'IBM Plex Mono'; font-size: 9.5px; color: var(--text-secondary); }
</style></head>
<body>
  <div class="head"><span class="label">// buttons</span><span class="meta">primary · secondary · nav-cta</span></div>
  <div class="row">
    <button class="btn-primary">View Projects</button>
    <button class="btn-secondary">Get in Touch</button>
    <button class="nav-cta">Hire Me</button>
  </div>
  <div class="specs">
    <div class="pair"><span class="k">Padding</span><span class="v">14px 32px</span></div>
    <div class="pair"><span class="k">Type</span><span class="v">mono 12 / 500 / 0.06em up</span></div>
    <div class="pair"><span class="k">Radius</span><span class="v">0</span></div>
    <div class="pair"><span class="k">Hover</span><span class="v">color invert</span></div>
  </div>
</body></html>
