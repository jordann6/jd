<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 0; background: #050505; }
  .head { display: flex; justify-content: space-between; align-items: center; padding: 16px 26px 16px; }
  .label { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .nav {
    margin: 0 26px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    background: rgba(5,5,5,0.85);
    backdrop-filter: blur(20px) saturate(120%);
    border: 1px solid #1e1e1e;
  }
  .logo { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 18px; color: #f0f0f0; letter-spacing: 0.02em; }
  .logo span { color: #555; }
  .links { display: flex; gap: 24px; }
  .lnk { font-family: 'IBM Plex Mono'; font-size: 10px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
  .lnk.active { color: #fff; }
  .cta { font-family: 'IBM Plex Mono'; font-size: 10px; font-weight: 500; color: #000; background: #f0f0f0; padding: 7px 16px; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body>
  <div class="head"><span class="label">// fixed nav · 64px · backdrop blur</span><span class="meta">site chrome</span></div>
  <div class="nav">
    <span class="logo">JN<span>.</span></span>
    <div class="links">
      <span class="lnk">About</span>
      <span class="lnk">Experience</span>
      <span class="lnk active">Projects</span>
      <span class="lnk">Skills</span>
      <span class="lnk">Contact</span>
    </div>
    <span class="cta">Hire Me</span>
  </div>
</body></html>
