<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 0; background: #050505; }
  .head { display: flex; justify-content: space-between; align-items: center; padding: 18px 26px 14px; }
  .label { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: #1e1e1e; border: 1px solid #1e1e1e; margin: 0 26px 22px; }
  .stat { background: #050505; padding: 22px 18px; }
  .num { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 28px; color: #f0f0f0; line-height: 1; margin-bottom: 6px; }
  .lab { font-family: 'IBM Plex Mono'; font-size: 9px; font-weight: 400; color: #555; letter-spacing: 0.06em; text-transform: uppercase; }
</style></head>
<body>
  <div class="head"><span class="label">// stat grid · 4-up</span><span class="meta">about section</span></div>
  <div class="stats">
    <div class="stat"><div class="num">5+</div><div class="lab">Years in Cloud</div></div>
    <div class="stat"><div class="num">2</div><div class="lab">Certifications</div></div>
    <div class="stat"><div class="num">AWS</div><div class="lab">+ Azure + GCP</div></div>
    <div class="stat"><div class="num">AI</div><div class="lab">Infra + Integration</div></div>
  </div>
</body></html>
