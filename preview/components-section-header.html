<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { padding: 22px 28px; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .label { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .sh {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .num { font-family: 'IBM Plex Mono'; font-size: 11px; font-weight: 400; color: #555; letter-spacing: 0.04em; }
  .ttl { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 26px; color: #f0f0f0; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .line { flex: 1; height: 1px; background: #1e1e1e; }
  .specs { display: flex; gap: 22px; padding-top: 14px; margin-top: 18px; border-top: 1px solid var(--border); }
  .pair { display: flex; flex-direction: column; gap: 2px; }
  .k { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .v { font-family: 'IBM Plex Mono'; font-size: 9.5px; color: var(--text-secondary); }
</style></head>
<body>
  <div class="head"><span class="label">// section header</span><span class="meta">numbered + ruled</span></div>
  <div class="sh">
    <span class="num">03</span>
    <span class="ttl">Projects</span>
    <span class="line"></span>
  </div>
  <div class="specs">
    <div class="pair"><span class="k">Number</span><span class="v">mono 12 / 0.04em</span></div>
    <div class="pair"><span class="k">Title</span><span class="v">display 28 / 700 / 0.1em up</span></div>
    <div class="pair"><span class="k">Rule</span><span class="v">1px #1e1e1e flex-1</span></div>
  </div>
</body></html>
