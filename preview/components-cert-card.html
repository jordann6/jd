<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { padding: 0; background: #050505; }
  .head { display: flex; justify-content: space-between; align-items: center; padding: 18px 26px 14px; }
  .label { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta { font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1e1e1e; border: 1px solid #1e1e1e; margin: 0 26px 22px; }
  .cert {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 22px;
    background: #050505;
  }
  .icon {
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed'; font-weight: 700; font-size: 12px;
    color: #f0f0f0; line-height: 1.15; letter-spacing: 0.04em; text-align: center;
    border: 1px solid #333;
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .name { font-family: 'Barlow Condensed'; font-weight: 600; font-size: 15px; color: #f0f0f0; letter-spacing: 0.02em; margin-bottom: 4px; }
  .prov { font-family: 'IBM Plex Mono'; font-size: 10px; color: #555; letter-spacing: 0.02em; }
  .status { font-family: 'IBM Plex Mono'; font-size: 9px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #555; padding: 4px 10px; border: 1px solid #1e1e1e; }
</style></head>
<body>
  <div class="head"><span class="label">// cert card</span><span class="meta">2-up grid</span></div>
  <div class="grid">
    <div class="cert">
      <div class="icon">AWS<br>SAA</div>
      <div class="info">
        <div class="name">Solutions Architect</div>
        <div class="prov">AWS · SAA-C03</div>
      </div>
      <span class="status">Active</span>
    </div>
    <div class="cert">
      <div class="icon">AZ<br>104</div>
      <div class="info">
        <div class="name">Azure Administrator</div>
        <div class="prov">Microsoft · AZ-104</div>
      </div>
    </div>
  </div>
</body></html>
