<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #050505; }
  .head { padding: 18px 26px 14px; display: flex; justify-content: space-between; align-items: center; }
  .head .label { font-size: 10px; }
  .head .meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .cell {
    padding: 22px 18px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 110px;
  }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .name { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--white); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 4px; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-dim); letter-spacing: 0.04em; margin-top: 8px; }
</style></head>
<body>
  <div class="head">
    <span class="label">// surface tokens</span>
    <span class="meta">page → card hover</span>
  </div>
  <div class="grid">
    <div class="cell" style="background:#050505">
      <div><div class="lbl">--bg</div><div class="name">Page</div></div>
      <div class="hex">#050505</div>
    </div>
    <div class="cell" style="background:#0c0c0c">
      <div><div class="lbl">--bg2</div><div class="name">Alt panel</div></div>
      <div class="hex">#0C0C0C</div>
    </div>
    <div class="cell" style="background:#111111">
      <div><div class="lbl">--surface</div><div class="name">Card hover</div></div>
      <div class="hex">#111111</div>
    </div>
    <div class="cell" style="background:#141414">
      <div><div class="lbl">--tag-bg</div><div class="name">Tag chip</div></div>
      <div class="hex">#141414</div>
    </div>
  </div>
</body></html>
