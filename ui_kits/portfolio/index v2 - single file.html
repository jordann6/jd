  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  --tag-bg: #141414;\n  --tag-border: #252525;\n  --tag-text: #999999;\n\n  --glow: rgba(255, 255, 255, 0.03);\n  --selection-bg: rgba(255, 255, 255, 0.15);\n\n  /* Semantic foreground aliases */\n  --fg-1: var(--white);          /* h1, h2, h3 */\n  --fg-2: var(--text);           /* default body */\n  --fg-3: var(--text-secondary); /* paragraph / supporting */\n  --fg-4: var(--text-dim);       /* metadata / dim */\n\n  /* Semantic background aliases */\n  --bg-1: var(--bg);\n  --bg-2: var(--surface);\n  --bg-3: var(--bg2);\n\n  /* ─────────────────────────────────────────────\n     TYPE — three families, mono dominates metadata\n     ───────────────────────────────────────────── */\n  --font-display: \"Barlow Condensed\", system-ui, sans-serif;\n  --font-body: \"Barlow\", system-ui, sans-serif;\n  --font-mono: \"IBM Plex Mono\", ui-monospace, monospace;\n\n  /* Type scale (px) */\n  --t-hero: clamp(72px, 14vw, 160px); /* hero name */\n  --t-display-1: clamp(48px, 6vw, 72px); /* contact headline */\n  --t-display-2: 28px;  /* section title */\n  --t-h3: 20px;         /* card / role title */\n  --t-h4: 16px;         /* cert name / company */\n  --t-body: 15px;\n  --t-body-sm: 14px;    /* about paragraphs */\n  --t-body-xs: 13px;    /* exp bullets / project desc */\n  --t-meta: 12px;       /* button labels */\n  --t-mono: 11px;       /* tags / footer */\n  --t-mono-sm: 10px;    /* badges / project tags */\n  --t-mono-xs: 9px;     /* project-tag */\n\n  /* Tracking (letter-spacing) */\n  --tr-tight: -0.02em;  /* hero name, contact headline */\n  --tr-display: 0.02em; /* logo, exp-role */\n  --tr-section: 0.1em;  /* SECTION TITLES */\n  --tr-meta-1: 0.04em;  /* small mono uppercase */\n  --tr-meta-2: 0.06em;\n  --tr-meta-3: 0.08em;  /* nav links, project-num */\n  --tr-meta-4: 0.2em;   /* hero subtitle */\n\n  /* Line-height */\n  --lh-tight: 0.9;     /* hero name */\n  --lh-snug: 1.2;      /* card titles */\n  --lh-base: 1.7;      /* body */\n  --lh-relaxed: 1.8;   /* long-form / project desc */\n  --lh-loose: 1.85;    /* about paragraphs */\n\n  /* ─────────────────────────────────────────────\n     SPACING + LAYOUT\n     ───────────────────────────────────────────── */\n  --max-w: 1100px;\n  --section-gap: 140px;\n  --section-pad-x: 48px;\n  --section-pad-x-sm: 24px;\n\n  --gap-xs: 6px;\n  --gap-sm: 12px;\n  --gap-md: 20px;\n  --gap-lg: 36px;\n  --gap-xl: 48px;\n  --gap-2xl: 64px;\n\n  --nav-h: 64px;\n  --radius: 0;          /* always zero — non-negotiable */\n  --hairline: 1px;\n\n  /* ─────────────────────────────────────────────\n     MOTION\n     ───────────────────────────────────────────── */\n  --ease: cubic-bezier(0.16, 1, 0.3, 1);\n  --dur-fast: 0.3s;     /* hover */\n  --dur-med: 0.4s;      /* card bg */\n  --dur-slow: 0.6s;     /* fade-in */\n  --stagger: 80ms;      /* sibling fade-in delay */\n\n  /* ─────────────────────────────────────────────\n     EFFECTS\n     ───────────────────────────────────────────── */\n  --blur-nav: blur(20px) saturate(120%);\n  --noise-opacity: 0.025; /* body grain */\n  --grid-opacity: 0.02;   /* hero grid lines */\n}\n\n/* ══════════════════════════════════════════════\n   SEMANTIC ELEMENT STYLES\n   Apply directly to bare elements when scaffolding\n   ══════════════════════════════════════════════ */\n\nbody {\n  font-family: var(--font-body);\n  font-weight: 300;\n  font-size: var(--t-body);\n  line-height: var(--lh-base);\n  color: var(--text);\n  background: var(--bg);\n}\n\nh1 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-hero);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tr-tight);\n  text-transform: uppercase;\n  color: var(--white);\n}\n\nh2 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-display-2);\n  letter-spacing: var(--tr-section);\n  text-transform: uppercase;\n  color: var(--white);\n}\n\nh3 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-h3);\n  letter-spacing: var(--tr-display);\n  color: var(--white);\n}\n\nh4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-h4);\n  text-transform: uppercase;\n  letter-spacing: var(--tr-meta-1);\n  color: var(--text-secondary);\n}\n\np {\n  font-family: var(--font-body);\n  font-size: var(--t-body-sm);\n  color: var(--text-secondary);\n  line-height: var(--lh-loose);\n}\n\nstrong {\n  font-weight: 500;\n  color: var(--white);\n}\n\ncode, kbd, samp, pre {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono);\n  color: var(--text-secondary);\n}\n\n::selection {\n  background: var(--selection-bg);\n  color: var(--white);\n}\n\n/* Utility: the eyebrow comment (\"// Available …\") */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--t-meta);\n  font-weight: 400;\n  color: var(--text-dim);\n  letter-spacing: var(--tr-meta-2);\n}\n\n/* Utility: section number (\"01\", \"02\", …) */\n.section-num {\n  font-family: var(--font-mono);\n  font-size: var(--t-meta);\n  color: var(--text-dim);\n  letter-spacing: var(--tr-meta-1);\n}\n\n/* Utility: outline / stroke-only display text */\n.stroke-only {\n  -webkit-text-stroke: 1px var(--text-dim);\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* Utility: mono uppercase metadata label */\n.mono-label {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono-sm);\n  font-weight: 500;\n  letter-spacing: var(--tr-meta-3);\n  text-transform: uppercase;\n  color: var(--text-dim);\n}\n<\u002Fstyle>\n  \n  <style>\n    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n    html { -webkit-font-smoothing: antialiased; }\n    body {\n      background: var(--bg); color: var(--text);\n      overflow-x: hidden; font-family: var(--font-body); font-weight: 300;\n      font-size: 15px; line-height: 1.7;\n      cursor: none;\n    }\n    a { color: inherit; text-decoration: none; }\n    button { font: inherit; cursor: none; border: 0; background: none; color: inherit; }\n\n    /* ─── Global grain ─── */\n    body::before {\n      content: \"\"; position: fixed; inset: 0; z-index: 9999;\n      pointer-events: none; opacity: 0.03;\n      background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n      background-size: 128px 128px; mix-blend-mode: overlay;\n    }\n    /* ─── Working blueprint columns ─── */\n    body::after {\n      content: \"\"; position: fixed; inset: 0; z-index: 0; pointer-events: none;\n      background-image:\n        linear-gradient(90deg, transparent calc(50% - 0.5px), rgba(255,255,255,0.018) calc(50% - 0.5px), rgba(255,255,255,0.018) calc(50% + 0.5px), transparent calc(50% + 0.5px));\n      max-width: 1280px; margin: 0 auto; left: 50%; transform: translateX(-50%);\n      width: calc(100% - 0px);\n    }\n\n    /* ─── Custom cursor ─── */\n    .cursor-ring {\n      position: fixed; top: 0; left: 0; z-index: 10000;\n      width: 28px; height: 28px;\n      border: 1px solid var(--text-secondary);\n      border-radius: 50%;\n      pointer-events: none;\n      transform: translate(-50%, -50%);\n      transition: width 0.25s var(--ease), height 0.25s var(--ease), border-color 0.25s var(--ease);\n      mix-blend-mode: difference;\n    }\n    .cursor-dot {\n      position: fixed; top: 0; left: 0; z-index: 10001;\n      width: 4px; height: 4px;\n      background: var(--white); border-radius: 50%;\n      pointer-events: none;\n      transform: translate(-50%, -50%);\n      mix-blend-mode: difference;\n    }\n    .cursor-ring.cursor-active {\n      width: 56px; height: 56px;\n      border-color: var(--white);\n    }\n    .cursor-coords {\n      position: fixed; z-index: 10001;\n      font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);\n      letter-spacing: 0.08em; pointer-events: none;\n      mix-blend-mode: difference;\n      transform: translate(20px, 20px);\n    }\n\n    /* ─── Persistent corner / edge UI ─── */\n    .frame-edge {\n      position: fixed; z-index: 1000;\n      font-family: var(--font-mono); font-size: 10px;\n      color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase;\n      pointer-events: none;\n    }\n    .frame-edge--tl { top: 24px; left: 24px; }\n    .frame-edge--tr { top: 24px; right: 24px; text-align: right; }\n    .frame-edge--bl { bottom: 24px; left: 24px; }\n    .frame-edge--br { bottom: 24px; right: 24px; text-align: right; }\n    .frame-edge .row { display: block; line-height: 1.5; }\n    .frame-edge .row + .row { margin-top: 4px; }\n    .frame-edge .lit { color: var(--text-secondary); }\n\n    /* ─── Vertical side rail ─── */\n    .side-rail {\n      position: fixed; left: 24px; top: 50%;\n      transform: translateY(-50%) rotate(-90deg);\n      transform-origin: left center;\n      font-family: var(--font-mono); font-size: 10px;\n      color: var(--text-dim); letter-spacing: 0.4em; text-transform: uppercase;\n      white-space: nowrap; z-index: 100; pointer-events: none;\n      display: flex; gap: 32px; align-items: center;\n    }\n    .side-rail .pip { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); }\n    .side-rail .active { color: var(--white); }\n    .side-rail .active + .pip-wrap .pip { background: var(--white); }\n\n    /* ─── NAV ─── */\n    .nav {\n      position: fixed; top: 0; left: 0; right: 0; z-index: 900;\n      display: grid; grid-template-columns: 1fr auto 1fr;\n      align-items: center; padding: 24px 80px;\n      mix-blend-mode: difference;\n    }\n    .nav__logo {\n      font-family: var(--font-display); font-weight: 800; font-size: 14px;\n      letter-spacing: 0.18em; text-transform: uppercase; color: var(--white);\n    }\n    .nav__links {\n      display: flex; gap: 32 n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Marquee -->\n    <div class=\"marquee\">\n      <div class=\"marquee__track\" id=\"mq\">\n        <!-- repeated content via JS -->\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ABOUT -->\n    <section id=\"about\" class=\"stage\" data-screen-label=\"02 About\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-head__num\">/01<\u002Fspan>\n        <h2 class=\"sec-head__title\">About<\u002Fh2>\n        <span class=\"sec-head__meta\">Origin / Practice<br>Scope of Work<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"about reveal\">\n        <p class=\"about__lead\">\n          From help desk to <strong>DevOps Engineer<\u002Fstrong> through deliberate practice — <span class=\"dim\">treating learning as a continuous discipline, not a phase.<\u002Fspan>\n        <\u002Fp>\n        <div class=\"about__body\">\n          <p>After leaving law school, I redirected toward software engineering and cloud infrastructure. My work emphasizes <strong>reliability, reproducibility, and operational awareness<\u002Fstrong> across the software development lifecycle.<\u002Fp>\n          <p>Currently at <strong>Snorkel AI<\u002Fstrong>, building DevSecOps pipelines, Kubernetes blue-green deployment strategies, and event-driven remediation systems on AWS and Azure.<\u002Fp>\n          <div class=\"stats\">\n            <div class=\"stat\"><div class=\"n\">5+<\u002Fdiv><div class=\"l\">YRS Cloud<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"n\">02<\u002Fdiv><div class=\"l\">Certs<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"n\">3×<\u002Fdiv><div class=\"l\">AWS · Azure · GCP<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"n\">AI<\u002Fdiv><div class=\"l\">Infra · Integration<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- EXPERIENCE -->\n    <section id=\"experience\" class=\"stage exp\" data-screen-label=\"03 Experience\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-head__num\">/02<\u002Fspan>\n        <h2 class=\"sec-head__title\">Work<\u002Fh2>\n        <span class=\"sec-head__meta\">Selected positions<br>2024 — Present<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <div class=\"exp__row\">\n          <div class=\"yr\">2025—<br>NOW<\u002Fdiv>\n          <div class=\"co\">\n            <div class=\"label\">↳ Employer<\u002Fdiv>\n            <div class=\"name\">Snorkel AI<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"body\">\n            <div class=\"role\">DevOps Specialist<\u002Fdiv>\n            <ul>\n              <li>Reduced vulnerable build promotion by 90% through a custom DevSecOps pipeline integrating SAST, DAST, and IaC scanning.<\u002Fli>\n              <li>Implemented Kubernetes blue-green deployment strategies enabling zero-downtime releases — deployment failures down ~70%.<\u002Fli>\n              <li>Orchestrated an event-driven remediation workflow (AWS Lambda + Boto3), cutting MTTR by ~40%.<\u002Fli>\n            <\u002Ful>\n            <div class=\"stack\">\n              <span class=\"tag\">AWS Lambda<\u002Fspan><span class=\"tag\">Kubernetes<\u002Fspan><span class=\"tag\">Boto3<\u002Fspan>\n              <span class=\"tag\">DevSecOps<\u002Fspan><span class=\"tag\">Bash<\u002Fspan><span class=\"tag\">IAM<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp__row\">\n          <div class=\"yr\">2024—<br>2025<\u002Fdiv>\n          <div class=\"co\">\n            <div class=\"label\">↳ Employer<\u002Fdiv>\n            <div class=\"name\">Wiggs CPA<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"body\">\n            <div class=\"role\">IT Support Specialist<\u002Fdiv>\n            <ul>\n              <li>Executed a cloud rehosting migration from AWS to Azure with full service dependency mapping.<\u002Fli>\n              <li>Provisioned and rightsized Azure infrastructure with IaC, maintaining 99%+ uptime post-migration.<\u002Fli>\n              <li>Engineered Python &amp; Bash scripts for Entra ID auth remediation — resolution time down ~50%.<\u002Fli>\n            <\u002Ful>\n            <div class=\"stack\">\n              <span class=\"tag\">Azure<\u002Fspan><span class=\"tag\">AWS<\u002Fspan><span class=\"tag\">Terraform<\u002Fspan>\n              <span class=\"tag\">Python<\u002Fspan><span class=\"tag\">Bash<\u002Fspan><span class=\"tag\">Entra ID<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PROJECTS -->\n    <section id=\"projects\" class=\"stage proj\" data-screen-label=\"04 Projects\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-head__num\">/03<\u002Fspan>\n        <h2 class=\"sec-head__title\">Index<\u002Fh2>\n        <span class=\"sec-head__meta\">Selected works<br>06 of 06<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"proj__list reveal\" id=\"projList\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SKILLS -->\n    <section id=\"skills\" class=\"stage skills\" data-screen-label=\"05 Skills\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-head__num\">/04<\u002Fspan>\n        <h2 class=\"sec-head__title\">Stack<\u002Fh2>\n        <span class=\"sec-head__meta\">Tools &amp; languages<br>Daily-use<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"skills__grid reveal\" id=\"skillsGrid\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CERTS -->\n    <section id=\"certs\" class=\"stage certs\" data-screen-label=\"06 Certs\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-head__num\">/05<\u002Fspan>\n        <h2 class=\"sec-head__title\">Certified<\u002Fh2>\n        <span class=\"sec-head__meta\">Credentials<br>Active 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"certs__grid reveal\">\n        <di 002Fdiv>\n        <div class=\"contact__links\">\n          <a class=\"contact__link\" href=\"mailto:jordandn6@outlook.com\">\n            <span class=\"label\">/Email<\u002Fspan><span class=\"val\">jordandn6@outlook.com<\u002Fspan><span class=\"arr\">↗<\u002Fspan>\n          <\u002Fa>\n          <a class=\"contact__link\" href=\"https://linkedin.com/in/jordan-nelson-aa0828165\">\n            <span class=\"label\">/LinkedIn<\u002Fspan><span class=\"val\">jordan-nelson<\u002Fspan><span class=\"arr\">↗<\u002Fspan>\n          <\u002Fa>\n          <a class=\"contact__link\" href=\"https://github.com/jordann6\">\n            <span class=\"label\">/GitHub<\u002Fspan><span class=\"val\">github.com/jordann6<\u002Fspan><span class=\"arr\">↗<\u002Fspan>\n          <\u002Fa>\n          <a class=\"contact__link\" href=\"https://jordandesigns.io\">\n            <span class=\"label\">/Site<\u002Fspan><span class=\"val\">jordandesigns.io<\u002Fspan><span class=\"arr\">↗<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <footer class=\"footer\">\n    <span>© 2026 Jordan Nelson<\u002Fspan>\n    <span class=\"footer__c\">↳ Designed &amp; Operated by JN<\u002Fspan>\n    <span class=\"footer__r\">Built on <span class=\"lit\">AWS<\u002Fspan> · jordandesigns.io<\u002Fspan>\n  <\u002Ffooter>\n\n  <!-- Project modal -->\n  <div id=\"modalRoot\"><\u002Fdiv>\n\n  <script>\n    /* ════════════════════════════\n       Tweaks defaults\n       ════════════════════════════ */\n    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n      \"outlineWeight\": 1.5,\n      \"scrollSpeed\": 40,\n      \"showCursor\": true,\n      \"showRail\": true\n    }/*EDITMODE-END*/;\n\n    /* ════════════════════════════\n       Custom cursor\n       ════════════════════════════ */\n    (function () {\n      const ring = document.getElementById('cursorRing');\n      const dot = document.getElementById('cursorDot');\n      const co = document.getElementById('cursorCoords');\n      let rx = innerWidth / 2, ry = innerHeight / 2;\n      let x = rx, y = ry;\n      addEventListener('mousemove', (e) => {\n        x = e.clientX; y = e.clientY;\n        dot.style.transform = `translate(${x - 2}px, ${y - 2}px)`;\n        co.style.transform = `translate(${x + 18}px, ${y + 18}px)`;\n        co.textContent = `+${x.toString().padStart(4, '0')}.000 / +${y.toString().padStart(4, '0')}.000`;\n      });\n      function tick() {\n        rx += (x - rx) * 0.18;\n        ry += (y - ry) * 0.18;\n        ring.style.transform = `translate(${rx - 14}px, ${ry - 14}px)`;\n        requestAnimationFrame(tick);\n      }\n      tick();\n      // Hover targets\n      document.addEventListener('mouseover', (e) => {\n        if (e.target.closest('a, button, [data-cursor=\"big\"], .proj__item, .contact__link, .skills__group .items span')) {\n          ring.classList.add('cursor-active');\n        }\n      }, true);\n      document.addEventListener('mouseout', (e) => {\n        if (e.target.closest('a, button, [data-cursor=\"big\"], .proj__item, .contact__link, .skills__group .items span')) {\n          ring.classList.remove('cursor-active');\n        }\n      }, true);\n    })();\n\n    /* ════════════════════════════\n       Live clock\n       ════════════════════════════ */\n    (function () {\n      const el = document.getElementById('ctClock');\n      function pad(n) { return n.toString().padStart(2, '0'); }\n      function tick() {\n        // Chicago = UTC-6 (CST); we're approximating without DST handling\n        const d = new Date();\n        const utc = d.getTime() + d.getTimezoneOffset() * 60000;\n        const ct = new Date(utc - 6 * 3600000);\n        el.textContent = `CT — ${pad(ct.getHours())}:${pad(ct.getMinutes())}:${pad(ct.getSeconds())}`;\n      }\n      tick(); setInterval(tick, 1000);\n    })();\n\n    /* ════════════════════════════\n       Marquee\n       ════════════════════════════ */\n    (function () {\n      const mq = document.getElementById('mq');\n      const items = ['Cloud', 'DevOps', 'Platform', 'Reliability', 'Security', 'Automation', 'Observability', 'AI Infra'];\n      function build() {\n        const block = items.map((it, i) =>\n          `<span${i % 2 === 1 ? ' class=\"dim\"' : ''}>${it}<\u002Fspan><span class=\"sep\">●<\u002Fspan>`\n        ).join('');\n        mq.innerHTML = block + block;\n      }\n      build();\n    })();\n\n    /* ════════════════════════════\n       Projects (list)\n       ════════════════════════════ */\n    const projects = [\n      { num: \"01\", title: \"LLM Gateway\", titleOut: \"& Observability\", desc: \"Cuts LLM API costs by routing requests across OpenAI and Anthropic based on cost, latency, or quality strategy. FastAPI gateway on ECS Fargate with DynamoDB caching and an LLM-as-judge eval pipeline.\", tags: [\"ECS Fargate\", \"FastAPI\", \"Terraform\", \"DynamoDB\", \"Lambda\"] },\n      { num: \"02\", title: \"Cloud Security\", titleOut: \"Lab\", desc: \"Full attack-detect-respond case study mapped to MITRE ATT&CK. Pacu kill chain, OpenSearch SIEM correlation, EventBridge-to-Lambda automated remediation, Falco runtime detection on K3s.\", tags: [\"Terraform\", \"GuardDuty\", \"OpenSearch\", \"Falco\", \"OPA Gatekeeper\"] },\n      { num: \"03\", title: \"Azure FinOps\", titleOut: \"Dashboard\", desc: \"Surfaces cloud spend trends, tagging gaps, cost anomalies, and budget forecasts. React on Azure Static Web Apps with C# .NET 8 timer-triggered Functions doing z-score anomaly detection and linear regression.\", tags: [\"Azure Functions\", \"Cosmos DB\", \"React\", \"C# .NET 8\"] },\n      { num: \"04\", title: \"NBA Intel\", titleOut: \"Center\", desc: \"RAG-powered prop analysis platform combining live NBA data with semantic search. FastAPI backend with Azure OpenAI GPT-4o and Qdrant vector search. Self-hosted on K3s with Cloudflare tunnel.\", tags: [\"FastAPI\", \"Azure OpenAI\", \"Qdrant\", \"RAG\", \"K3s\"] },\n      { num: \"05\", title: \"Uptime\", titleOut: \"Monitor\", desc: \"Automated health monitoring for jordandesigns.io with zero ongoing cost. EventBridge triggers a Python 3.11 Lambda checking HTTP status, logging to DynamoDB with 90-day TTL, SNS email alerts on failure.\", tags: [\"EventBridge\", \"Lambda\", \"DynamoDB\", \"SNS\", \"Python\"] },\n      { num: \"06\", title: \"NFL Reliability\", titleOut: \"Platform\", desc: \"Enforces data quality SLOs for NFL API ingestion with automated schema validation and quarantine logic. Containerized Python service on Azure Container Apps. Custom Prometheus metrics with PromQL burn-rate analysis.\", tags: [\"Azure Container Apps\", \"Prometheus\", \"Grafana\", \"SRE\"] },\n    ];\n    (function () {\n      const root = document.getElementById('projList');\n      root.innerHTML = projects.map(p => `\n        <a class=\"proj__item\" data-num=\"${p.num}\" href=\"#\">\n          <div class=\"proj__num\">/${p.num}<\u002Fdiv>\n          <div class=\"proj__main\">\n            <div class=\"proj__title\">${p.title} <span class=\"out\">${p.titleOut}<\u002Fspan><\u002Fdiv>\n            <div class=\"proj__hover-tags\">\n              ${p.tags.map(t => `<span class=\"tag\">${t}<\u002Fspan>`).join('')}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"proj__arrow\">↗<\u002Fspan>\n        <\u002Fa>\n      `).join('');\n      root.addEventListener('click', (e) => {\n        const it = e.target.closest('.proj__item');\n        if (!it) return;\n        e.preventDefault();\n        openModal(projects.find(p => p.num === it.dataset.num));\n      });\n    })();\n\n    function openModal(p) {\n      const root = document.getElementById('modalRoot');\n      root.innerHTML = `\n        <div class=\"modal-mask\">\n          <div class=\"modal\">\n            <div style=\"display:flex;justify-content:space-between;margin-bottom:24px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim)\">\n              <span>↳ Project /${p.num}<\u002Fspan><span class=\"closeM\" style=\"cursor:none\">Close ✕<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:48px;line-height:0.95;letter-spacing:-0.02em;text-transform:uppercase;color:var(--white);margin-bottom:24px\">\n              ${p.title} <span style=\"-webkit-text-stroke:1px var(--white);-webkit-text-fill-color:transparent\">${p.titleOut}<\u002Fspan>\n            <\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.8;color:var(--text-secondary);margin-bottom:32px;max-width:60ch\">${p.desc}<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:36px\">\n              ${p.tags.map(t => `<span class=\"tag\">${t}<\u002Fspan>`).join('')}\n            <\u002Fdiv>\n            <a class=\"btn btn--primary\" href=\"https://github.com/jordann6\" target=\"_blank\">View on GitHub <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n      const close = () => root.innerHTML = '';\n      root.querySelector('.modal-mask').addEventListener('click', (e) => {\n        if (e.target.classList.contains('modal-mask') || e.target.classList.contains('closeM')) close();\n      });\n    }\n\n    /* ════════════════════════════\n       Skills\n       ════════════════════════════ */\n    const skills = [\n      { label: \"/Languages\", tags: [\"Python\", \"JavaScript\", \"Bash\", \"Go\", \"C#\", \"SQL\"] },\n      { label: \"/Cloud\", tags: [\"AWS\", \"Azure\", \"GCP\"] },\n      { label: \"/Infra\", tags: [\"Docker\", \"Kubernetes\", \"Linux\", \"Terraform\"] },\n      { label: \"/Pipelines\", tags: [\"GitHub Actions\", \"CI/CD\"] },\n      { label: \"/Observability\", tags: [\"Prometheus\", \"Grafana\", \"PromQL\", \"Falco\"] },\n      { label: \"/AI Infra\", tags: [\"LLM Gateway\", \"RAG Pipelines\", \"Vector Search\", \"OpenAI / Anthropic\"] },\n    ];\n    (function () {\n      const root = document.getElementById('skillsGrid');\n      root.innerHTML = skills.map(g => `\n        <div class=\"skills__group\">\n          <div class=\"label\">${g.label}<\u002Fdiv>\n          <div class=\"items\">${g.tags.map((t, i) => `<span>${t}${i < g.tags.length - 1 ? ',' : ''}<\u002Fspan>`).join('')}<\u002Fdiv>\n        <\u002Fdiv>\n      `).join('');\n    })();\n\n    /* ════════════════════════════\n       Reveal on scroll + nav active\n       ════════════════════════════ */\n    (function () {\n      const obs = new IntersectionObserver((es) => {\n        es.forEach(e => {\n          if (e.isIntersecting) {\n            e.target.classList.add('in');\n            obs.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1 });\n      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));\n\n      // Nav active + side rail\n      const navLinks = document.querySelectorAll('.nav__link');\n      const sections = ['hero', 'about', 'experience', 'projects', 'skills', 'certs', 'contact'];\n      const railPos = document.getElementById('railPos');\n      const obs2 = new IntersectionObserver((es) => {\n        es.forEach(e => {\n          if (e.isIntersecting) {\n            const id = e.target.id;\n            navLinks.forEach(l => l.classList.toggle('active', l.dataset.target === id));\n            const idx = sections.indexOf(id);\n            if (idx >= 0) railPos.textContent = `${(idx + 1).toString().padStart(2, '0')} / ${sections.length.toString().padStart(2, '0')}`;\n          }\n        });\n      }, { threshold: 0.5 });\n      sections.forEach(id => { const el = document.getElementById(id); if (el) obs2.observe(el); });\n\n      // Smooth nav clicks\n      navLinks.forEach(l => l.addEventListener('click', (e) => {\n        e.preventDefault();\n        const t = document.getElementById(l.dataset.target);\n        if (t) window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - 40, behavior: 'smooth' });\n      }));\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
