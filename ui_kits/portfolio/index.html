<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jordan Nelson — Portfolio UI Kit</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; font-family: var(--font-body); font-weight: 300; font-size: 15px; line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }
    button { font: inherit; }
    /* fade-in mimicry */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s var(--ease), transform 0.6s var(--ease); }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    /* modal */
    .pdetail-mask {
      position: fixed; inset: 0; z-index: 1100;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      padding: 60px 40px;
      backdrop-filter: blur(8px);
    }
    .pdetail {
      background: var(--bg);
      border: 1px solid var(--border);
      max-width: 720px; width: 100%; max-height: 80vh; overflow-y: auto;
      padding: 48px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components-core.jsx"></script>
  <script type="text/babel" src="components-sections.jsx"></script>
  <script type="text/babel" src="components-content.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ProjectDetail({ p, onClose }) {
      if (!p) return null;
      return (
        <div className="pdetail-mask" onClick={onClose}>
          <div className="pdetail" onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-dim)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Project {p.num}</span>
              <span onClick={onClose} style={{ cursor: "pointer", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-dim)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Close ✕</span>
            </div>
            <h2 style={{ fontFamily: "var(--font-display)", fontSize: 32, fontWeight: 700, color: "var(--white)", letterSpacing: "0.01em", lineHeight: 1.15, marginBottom: 24 }}>{p.title}</h2>
            <p style={{ fontSize: 14, lineHeight: 1.85, color: "var(--text-secondary)", marginBottom: 28 }}>{p.desc}</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 32 }}>
              {p.tags.map((t) => <Tag key={t} size="exp">{t}</Tag>)}
            </div>
            <BtnPrimary>View on GitHub</BtnPrimary>
          </div>
        </div>
      );
    }

    function App() {
      const [active, setActive] = useState("hero");
      const [openProject, setOpenProject] = useState(null);
      const [views, setViews] = useState("Loading Views...");

      useEffect(() => {
        // simulate the live visitor counter
        const t = setTimeout(() => setViews("4,217 Views"), 800);
        return () => clearTimeout(t);
      }, []);

      const onNav = (id) => {
        setActive(id);
        const el = document.getElementById(id);
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - 80;
          window.scrollTo({ top: y, behavior: "smooth" });
        }
      };

      // intersection observer for fade-in mimicry
      useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("visible");
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll("section").forEach((s) => {
          s.classList.add("fade-in");
          obs.observe(s);
        });
      }, []);

      return (
        <>
          <Nav active={active} onNav={onNav} />
          <Hero visitorCount={views} />
          <About />
          <Experience />
          <Projects onOpen={setOpenProject} />
          <Skills />
          <Certs />
          <Contact />
          <Footer />
          <ProjectDetail p={openProject} onClose={() => setOpenProject(null)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
